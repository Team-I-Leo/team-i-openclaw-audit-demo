    function renderWorkbench() {
      const c = state.selectedCase;
      document.getElementById('workbenchTitle').textContent = c ? `${c.case_id} · ${caseHeadline(c)}` : '风险案件详情';
      document.getElementById('selectedStatus').textContent = c ? `${c.pattern_id} · ${statusText(c)}` : '请选择案例';
      const reviewMenu = document.getElementById('reviewMenu');
      if (reviewMenu) {
        reviewMenu.hidden = !state.reviewMenuOpen;
        if (state.reviewMenuOpen) {
          reviewMenu.innerHTML = renderReviewPanel();
        }
      }
      const tabs = [
        ['orders', '风险订单'],
        ['trace', '主动追证流程'],
        ['passport', '审计报告']
      ];
      document.getElementById('tabs').innerHTML = tabs.map(([id, label]) => `
        <div class="tab ${state.activeTab === id ? 'active' : ''}" onclick="setTab('${id}')">${label}</div>
      `).join('');
      if (!c) {
        document.getElementById('tabBody').innerHTML = `<div class="empty">请选择一个风险案件开始演示</div>`;
        return;
      }
      if (state.activeTab === 'orders') renderOrdersTab();
      if (state.activeTab === 'trace') renderTraceTab();
      if (state.activeTab === 'passport') renderPassportTab();
    }

    function renderReviewPanel() {
      const mode = state.reviewMode;
      if (!mode) {
        return `
          <div style="margin-bottom:10px;font-weight:800">请选择人工复核结论：</div>
          <div class="review-panel-btns">
            <button class="danger" onclick="setReviewMode('risk_founded')">风险成立</button>
            <button onclick="setReviewMode('risk_not_founded')">风险不成立</button>
            <button class="warn" onclick="setReviewMode('evidence_insufficient')">证据不足</button>
          </div>
        `;
      }
      if (mode === 'risk_founded') {
        return `
          <div style="margin-bottom:10px;font-weight:800">风险成立 — 请选择处置措施：</div>
          <div class="review-form">
            <div class="recommend-list">
              <label class="recommend-item"><input type="radio" name="riskAction" value="冻结关联账号" checked> 冻结关联账号</label>
              <label class="recommend-item"><input type="radio" name="riskAction" value="限制提现与补贴资格"> 限制提现与补贴资格</label>
              <label class="recommend-item"><input type="radio" name="riskAction" value="标记黑名单并上报监管"> 标记黑名单并上报监管</label>
              <label class="recommend-item"><input type="radio" name="riskAction" value="custom"> 自定义处置措施</label>
            </div>
            <textarea id="customRiskAction" placeholder="若选择自定义，请在此输入处置措施..."></textarea>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
              <button onclick="setReviewMode(null)">返回</button>
              <button class="primary" onclick="submitReviewAction('risk_founded')">确认处置</button>
            </div>
          </div>
        `;
      }
      if (mode === 'risk_not_founded') {
        return `
          <div style="margin-bottom:10px;font-weight:800">风险不成立</div>
          <div class="review-form">
            <p style="color:var(--green);font-weight:900;font-size:16px">相关订单已放行。</p>
            <p class="muted">系统已将该案件标记为"风险不成立"，关联订单恢复正常流转。</p>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
              <button onclick="setReviewMode(null)">返回</button>
              <button class="primary" onclick="submitReviewAction('risk_not_founded')">确认</button>
            </div>
          </div>
        `;
      }
      if (mode === 'evidence_insufficient') {
        return `
          <div style="margin-bottom:10px;font-weight:800">证据不足 — 请指出下一步调查方向：</div>
          <div class="review-form">
            <textarea id="investigateDirection" placeholder="请输入您认为需要补充调查的方向，例如：补充物流轨迹真实性核验、扩大设备指纹关联范围、增加促销窗口同期对比..."></textarea>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px">
              <button onclick="setReviewMode(null)">返回</button>
              <button class="primary" onclick="submitReviewAction('evidence_insufficient')">确认并重新追证</button>
            </div>
          </div>
        `;
      }
      return '';
    }

    function setReviewMode(mode) {
      state.reviewMode = mode;
      renderWorkbench();
    }

    async function submitReviewAction(decision) {
      const c = state.selectedCase;
      if (!c) return;
      let actionText = '';
      if (decision === 'risk_founded') {
        const radios = document.querySelectorAll('input[name="riskAction"]');
        let selected = '';
        for (const r of radios) { if (r.checked) { selected = r.value; break; } }
        if (selected === 'custom') {
          actionText = document.getElementById('customRiskAction')?.value?.trim() || '自定义处置';
        } else {
          actionText = selected;
        }
        if (!actionText) { toast('请选择或输入处置措施'); return; }
        state.caseResultMap[c.case_id] = { decision: 'risk_founded', action: actionText, status: '处置已完成' };
        toast(`处置已完成：${actionText}`);
      }
      if (decision === 'risk_not_founded') {
        state.caseResultMap[c.case_id] = { decision: 'risk_not_founded', action: '订单已放行', status: '订单已放行' };
        toast('相关订单已放行');
      }
      if (decision === 'evidence_insufficient') {
        const direction = document.getElementById('investigateDirection')?.value?.trim();
        if (!direction) { toast('请输入下一步调查方向'); return; }
        state.caseResultMap[c.case_id] = { decision: 'evidence_insufficient', action: direction, status: '重新追证中' };
        toast(`已记录调查方向：${direction}，AI 重新进入主动追证流程...`);
        try {
          await api(`/api/cases/${c.case_id}/run?max_steps=8`, { method: 'POST' });
          await refreshAll();
          toast('AI 追证已完成，证据护照已更新。');
        } catch (err) { toast(`追证失败：${err.message || err}`); }
      }
      state.reviewMenuOpen = false;
      state.reviewMode = null;
      try {
        await api(`/api/cases/${c.case_id}/review`, {
          method: 'POST',
          body: JSON.stringify({ decision, note: actionText || direction || '订单已放行', reviewer: 'demo_auditor' })
        });
        await refreshAll();
      } catch (err) { /* ignore backend review errors in demo */ }
      renderWorkbench();
    }

    function renderTraceTab() {
      const c = state.selectedCase;
      const steps = getTraceSteps(c);
      const selectedIndex = Math.min(Math.max(state.selectedTraceStep, 0), steps.length - 1);
      const selectedStep = steps[selectedIndex];
      document.getElementById('tabBody').innerHTML = `
        <div class="trace-steps">
          ${steps.map((s, i) => `
            <div class="trace-step ${s.status} ${i === selectedIndex ? 'selected' : ''}" onclick="selectTraceStep(${i})">
              <div class="step-num">${i + 1}</div>
              <div class="step-name">${s.name}</div>
              <div class="step-status">${s.status === 'completed' ? '已完成' : s.status === 'skipped' ? '已跳过' : '待执行'}</div>
            </div>
          `).join('')}
        </div>
        <div class="step-detail">
          ${renderStepDetail(selectedStep, c)}
        </div>
      `;
    }

    function cnEvidenceDimension(dim) {
      const map = {
        'device_clustering': '设备聚类',
        'refund_rate': '退款率异常',
        'subsidy_rate': '补贴率异常',
        'ip_segment': 'IP同段',
        'logistics_anomaly': '物流异常',
        'automation_score': '自动确认率',
        'review_reuse': '评论复用',
        'payment_reuse': '支付复用',
        'qualification_key': '资格Key集中',
        'behavior_sequence': '行为序列',
        'refund_speed': '退款时效',
        'cohort_comparison': '促销窗口对比'
      };
      return map[dim] || dim;
    }

    function cnEvidenceSource(src) {
      const map = {
        'graph': '关系图谱',
        'statistical': '统计模型',
        'logistics': '物流系统',
        'payment': '支付系统',
        'review': '评论系统',
        'user_behavior': '用户行为',
        'external': '外部数据',
        'rule_engine': '规则引擎',
        'llm': '大模型分析'
      };
      return map[src] || src;
    }

    function cnEvidenceDesc(desc) {
      if (!desc || typeof desc !== 'string') return desc || '--';
      const map = {
        'Multiple accounts share the same device fingerprint': '多个账号共享同一设备指纹',
        'High refund rate detected in subsidy orders': '补贴订单中检测到高退款率',
        'Abnormal logistics tracking patterns': '物流追踪模式异常',
        'Review content shows high similarity': '评论内容高度相似',
        'Payment accounts reused across multiple orders': '支付账户在多个订单中复用',
        'Qualification key concentrated in few accounts': '资格Key集中在少数账号',
        'Refund completed within 24 hours repeatedly': '退款在24小时内反复完成',
        'IP addresses from same segment': 'IP地址来自同一网段',
        'Automated confirmation rate exceeds threshold': '自动确认率超过阈值'
      };
      return map[desc] || desc;
    }

    function cnAssertion(c) {
      if (c?.assertion && /[\u4e00-\u9fa5]/.test(c.assertion)) return c.assertion;
      const pid = c?.pattern_id;
      if (pid === 'EC-SKIM-001') return `在促销窗口期内，检测到同一设备/网络环境下存在多个账号集中下单并高频退款，疑似团伙刷单骗补。案件 ${c?.case_id} 共涉及多个关联账号，退款率与补贴率均显著高于正常水平。`;
      if (pid === 'EC-FAKE-002') return `物流轨迹异常率高，自动确认收货占比显著，评论内容高度复用，疑似空包虚假交易。案件 ${c?.case_id} 的物流真实性存疑，建议进一步核验。`;
      if (pid === 'EC-ARBI-003') return `同一资格Key集中使用，补贴率与退款率双高，支付账户复用明显，疑似补贴套利观察。案件 ${c?.case_id} 存在明显的套利行为特征。`;
      return c?.assertion || '风险断言尚未生成。';
    }

    function renderPassportTab() {
      const c = state.selectedCase;
      const p = state.passport || {};
      const evidence = c?.evidence || [];
      const support = evidence.filter(e => e.kind === 'support');
      const counter = evidence.filter(e => e.kind !== 'support');
      const scores = safeJson(c?.scores, {});
      const entities = safeJson(c?.primary_entities, {});
      const orders = entities.orders || [];
      const users = entities.users || [];
      const patternName = shortPatternName(c?.pattern_id);
      const confidenceScore = fmt((c?.risk_score || 0) * 100, 0);
      const totalAmount = orders.reduce((sum, _, i) => sum + (c.pattern_id === 'EC-ARBI-003' ? 150 + i * 17 : c.pattern_id === 'EC-FAKE-002' ? 58 + i * 8 : 249 + i * 11), 0);
      const supportLogic = support.length
        ? support.map((e, i) => `${i + 1}) ${cnEvidenceDimension(e.dimension)}（来源：${cnEvidenceSource(e.source)}，置信度 ${fmt(e.confidence, 2)}）—— ${cnEvidenceDesc(e.description)}`).join('<br>')
        : '目前系统尚未收集到明确的支持证据，建议继续执行追证动作以补齐证据缺口。';
      const counterLogic = counter.length
        ? counter.map((e, i) => `${i + 1}) ${cnEvidenceDimension(e.dimension)}—— ${cnEvidenceDesc(e.description)}`).join('<br>')
        : '尚未发现有效反证，风险方向未出现明显偏差。';
      const riskExplanation = cnAssertion(c) || `经系统分析，案件 ${c?.case_id} 命中风险模式 ${patternName}。该模式主要表现为：${topSignals(c)}。综合统计、关系与行为三个维度的评分，系统判定当前风险置信度为 ${confidenceScore}%。`;
      const governanceImpact = `本案件共涉及 <b>${orders.length}</b> 笔订单、<b>${users.length}</b> 个关联账号，预估涉案金额约 <b>¥${fmt(totalAmount, 0)}</b>。若风险属实，可能导致平台补贴资金损失、用户信任度下降，并存在被监管通报的合规隐患。建议根据证据充分性及时采取冻结、限制或上报等措施，控制损失扩散。`;
      const disposalMap = {
        'EC-SKIM-001': ['冻结关联账号的登录与交易权限', '限制关联账号的提现与补贴资格', '追回已发放的违规补贴资金', '将涉事设备指纹与 IP 段标记黑名单', '冻结关联支付账户资金 72 小时'],
        'EC-FAKE-002': ['冻结店铺保证金并暂停结算', '下架关联商品链接并限制上新', '冻结虚假订单对应的已结算资金', '限制涉事店铺发货权限', '将店铺主体上报平台风控名单'],
        'EC-ARBI-003': ['追回违规领取的补贴与优惠券', '限制账号参与平台营销活动 90 天', '冻结套利资金流水并挂账待核', '将资格 Key 与支付账户加入限制名单', '情节严重时上报属地监管部门']
      };
      const defaultActions = ['冻结关联账号的登录与交易权限', '限制关联账号的提现与补贴资格', '追回已发放的违规补贴资金', '保留完整证据链以备后续审计与监管检查'];
      const actions = disposalMap[c?.pattern_id] || defaultActions;
      const actionList = actions.map((a, i) => `<li style="margin-bottom:6px">${i + 1}. ${a}</li>`).join('');
      const humanGate = p?.human_gate?.required ?? true;
      document.getElementById('tabBody').innerHTML = `
        <div style="display:grid;gap:12px">
          <div class="passport-grid">
            <div class="passport-box">
              <h4>一、风险解释</h4>
              <p style="line-height:1.7">${riskExplanation}</p>
              <p style="margin-top:8px">风险模式：<span class="cyan-text">${c?.pattern_id} ${patternName}</span> · 置信度：<span class="cyan-text">${confidenceScore}%</span></p>
            </div>
            <div class="passport-box">
              <h4>二、梳理证据逻辑</h4>
              <p style="line-height:1.7"><b>支持证据链（${support.length} 条）：</b><br>${supportLogic}</p>
              <p style="margin-top:10px;line-height:1.7"><b>反证与不确定性（${counter.length} 条）：</b><br>${counterLogic}</p>
            </div>
          </div>
          <div class="passport-grid">
            <div class="passport-box">
              <h4>三、评估治理影响</h4>
              <p style="line-height:1.7">${governanceImpact}</p>
              <div class="signal-tags" style="margin-top:10px">
                <span class="pill">订单 ${orders.length} 笔</span>
                <span class="pill">账号 ${users.length} 个</span>
                <span class="pill blue">统计维度 ${fmt(scores.statistical, 3)}</span>
                <span class="pill blue">关系维度 ${fmt(scores.relational, 3)}</span>
                <span class="pill blue">行为维度 ${fmt(scores.narrative_behavior, 3)}</span>
              </div>
            </div>
            <div class="passport-box">
              <h4>四、处置建议</h4>
              <ul style="padding-left:18px;line-height:1.7">${actionList}</ul>
              <p style="margin-top:10px">${humanGate ? '<span class="pill red">需人工审批</span> 当前证据满足度不足，建议由人工确认后再执行上述处置。' : '<span class="pill green">可自动流转</span> 证据充分，系统可直接执行上述处置。'}</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderGraphTab() {
      document.getElementById('tabBody').innerHTML = `
        <div class="split">
          <div class="subpanel">
            <div class="subhead"><h4>多源证据融合图谱</h4><span class="pill blue">${(state.graph?.nodes || []).length} 节点</span></div>
            <div class="graph-wrap">${graphSvg(state.graph)}</div>
            <div class="legend">
              <span><i style="background:var(--cyan)"></i>案件/断言</span>
              <span><i style="background:var(--blue)"></i>实体</span>
              <span><i style="background:var(--green)"></i>支持证据</span>
              <span><i style="background:var(--amber)"></i>反证/不确定性</span>
            </div>
          </div>
          <div class="subpanel">
            <div class="subhead"><h4>融合算法讲解</h4><span class="pill green">可解释</span></div>
            <div class="writeback" style="grid-template-columns:1fr">
              <div class="write-step"><b>统计异常</b><span class="muted">促销 cohort、退款率、补贴率、外部 IEEE 特征形成初始 risk score。</span></div>
              <div class="write-step"><b>关系图扩展</b><span class="muted">用户、设备、IP、支付账户、订单、物流节点进入图谱，按关系权重连接。</span></div>
              <div class="write-step"><b>证据覆盖度</b><span class="muted">每个 pattern 定义 required evidence，router 按 missing dimension 和成本治理风险排序 action。</span></div>
              <div class="write-step"><b>反证约束</b><span class="muted">不是只找支持证据，必须主动检索家庭共享、校园、仓配批量、自然活动等反证。</span></div>
            </div>
          </div>
        </div>
      `;
    }

    function graphSvg(graph) {
      if (!graph || !graph.nodes || !graph.nodes.length) return `<div class="empty">暂无图谱数据</div>`;
      const nodes = graph.nodes.slice(0, 42);
      const edges = (graph.edges || []).slice(0, 70);
      const pos = {};
      nodes.forEach((n, i) => {
        const ring = i < 1 ? 0 : i < 8 ? 1 : i < 22 ? 2 : 3;
        const count = ring === 0 ? 1 : ring === 1 ? 7 : ring === 2 ? 14 : 20;
        const idx = ring === 0 ? 0 : ring === 1 ? i - 1 : ring === 2 ? i - 8 : i - 22;
        const angle = -Math.PI / 2 + idx * Math.PI * 2 / count;
        const radius = ring === 0 ? 0 : ring === 1 ? 90 : ring === 2 ? 160 : 220;
        pos[n.id] = { x: 320 + Math.cos(angle) * radius, y: 235 + Math.sin(angle) * radius, node: n };
      });
      const edgeSvg = edges.map(e => {
        const s = pos[e.source], t = pos[e.target];
        if (!s || !t) return '';
        return `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="rgba(124,172,255,.18)" stroke-width="${Math.max(1, Number(e.weight || .4) * 2)}"/>`;
      }).join('');
      const nodeSvg = nodes.map(n => {
        const p = pos[n.id];
        const type = n.type || '';
        const fill = type === 'case' || type === 'assertion' ? '#22e7ca' : type === 'evidence' ? '#2fe68f' : '#45a3ff';
        const r = type === 'case' ? 12 : type === 'assertion' ? 10 : type === 'evidence' ? 8 : 6;
        const label = String(n.label || n.id).slice(0, 18);
        return `<g>
          <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${fill}" opacity=".92"/>
          <text x="${p.x + 10}" y="${p.y + 4}" fill="#b8cad8" font-size="10">${label}</text>
        </g>`;
      }).join('');
      return `<svg class="graph-svg" viewBox="0 0 640 470">${edgeSvg}${nodeSvg}</svg>`;
    }

    function renderLearningTab() {
      const c = state.selectedCase;
      if (!c) {
        document.getElementById('tabBody').innerHTML = `<div class="empty">请选择一个风险案件查看命中模式</div>`;
        return;
      }
      const signals = Object.entries(safeJson(c.signal_strength, {}) || {});
      const requirements = Object.entries(safeJson(c.evidence_requirements, {}) || {});
      const scores = safeJson(c.scores, {});
      const currentWeights = (state.policyWeights || []).filter(w => w.pattern_id === c.pattern_id);
      document.getElementById('tabBody').innerHTML = `
        <div class="learning-grid">
          <div class="subpanel">
            <div class="subhead"><h4>当前案件命中模式</h4><span class="pill ${riskLevelClass(c.risk_level)}">${c.case_id}</span></div>
            <div class="candidate active" style="cursor:default">
              <div style="display:flex;justify-content:space-between;gap:8px">
                <b>${c.pattern_id}</b>
                <span class="pill ${riskLevelClass(c.risk_level)}">${c.risk_level}</span>
              </div>
              <div class="muted">${c.pattern_name || shortPatternName(c.pattern_id)}</div>
              <div class="candidate-meta">
                <span class="pill blue">置信度 ${fmt((c.risk_score || 0) * 100, 0)}%</span>
                <span class="pill green">单案件模式</span>
              </div>
            </div>
            <div class="writeback" style="grid-template-columns:1fr;margin-top:10px">
              <div class="write-step"><b>规则特征</b><span class="muted">${topSignals(c)}</span></div>
              <div class="write-step"><b>模式断言</b><span class="muted">${c.assertion || '当前案件已命中该模式的核心规则特征。'}</span></div>
              <div class="write-step"><b>关键分值</b><span class="muted">统计维度=${fmt(scores.statistical, 3)} · 关系维度=${fmt(scores.relational, 3)} · 行为维度=${fmt(scores.narrative_behavior, 3)}</span></div>
            </div>
          </div>
          <div class="subpanel">
            <div class="subhead">
              <h4>该模式下的证据要求与动作先验</h4>
              <span class="pill blue">${requirements.length} 个证据维度</span>
            </div>
            <div class="signal-tags" style="margin-bottom:12px">
              ${signals.map(([name, level]) => `<span class="pill ${String(level).toLowerCase() === 'strong' ? 'green' : String(level).toLowerCase() === 'medium' ? 'blue' : 'amber'}">${name} · ${level}</span>`).join('') || '<span class="pill">暂无信号强度</span>'}
            </div>
            <div class="writeback" style="grid-template-columns:repeat(3,1fr)">
              ${requirements.slice(0, 9).map(([name, weight]) => `<div class="write-step"><b>${name}</b><span class="muted">所需权重=${fmt(weight, 2)}</span></div>`).join('') || '<div class="empty">暂无证据要求定义</div>'}
            </div>
            <div class="subhead" style="margin-top:14px"><h4>当前模式 Policy 权重</h4><span class="pill blue">${currentWeights.length} 行</span></div>
            <div class="timeline" style="max-height:178px">${currentWeights.slice(0, 12).map(w => `
              <div class="route-row">
                <div><b>${w.pattern_id}</b><div class="muted">${actionLabels[w.action_name] || w.action_name} · 来源=${w.source_candidate_id}</div></div>
                <span class="pill green">+${fmt(w.weight_delta, 3)}</span>
              </div>
            `).join('') || `<div class="empty">该模式暂无人工确认后的 policy 权重</div>`}</div>
          </div>
        </div>
      `;
    }

    function activeTraceIndex(threads) {
      if (!threads.length) return -1;
      if (state.tracePlayIndex < 0) return threads.length - 1;
      return Math.max(0, Math.min(state.tracePlayIndex, threads.length - 1));
    }

    function playTrace() {
      const threads = state.selectedCase?.thread || [];
      if (!threads.length) {
        toast('当前案例还没有追证轨迹，请先运行下一步追证或完整闭环。');
        return;
      }
      clearInterval(state.tracePlaybackTimer);
      state.activePage = 'trace';
      state.activeTab = 'trace';
      state.tracePlayIndex = 0;
      state.tracePlaybackActive = true;
      renderAll();
      state.tracePlaybackTimer = setInterval(() => {
        const total = state.selectedCase?.thread?.length || 0;
        if (state.tracePlayIndex >= total - 1) {
          clearInterval(state.tracePlaybackTimer);
          state.tracePlaybackActive = false;
          toast('主动追证播放完成：每一步 action、agent 决策、观察结果和证据增量已串起来。');
          renderWorkbench();
          return;
        }
        state.tracePlayIndex += 1;
        renderWorkbench();
      }, 950);
    }

    function resetTracePlayback() {
      clearInterval(state.tracePlaybackTimer);
      state.tracePlaybackActive = false;
      state.tracePlayIndex = -1;
      renderWorkbench();
    }

    function evidenceFor(caseId) {
      if (state.caseDetails[caseId]) return state.caseDetails[caseId].evidence || [];
      if (state.selectedCase?.case_id === caseId) return state.selectedCase.evidence || [];
      return [];
    }

    function toggleCaseExpand(id, event) {
      event?.stopPropagation();
      state.expandedCaseId = state.expandedCaseId === id ? null : id;
    }

    async function enterCaseDetail(id, event) {
      event?.stopPropagation();
      state.detailFocus = true;
      state.activeTab = 'trace';
      state.reviewMenuOpen = false;
      await selectCase(id);
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    function exitDetail() {
      state.detailFocus = false;
      state.reviewMenuOpen = false;
      state.highlightedOrderId = null;
      renderAll();
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    async function selectCase(id) {
      state.selectedCaseId = id;
      state.expandedCaseId = id;
      state.tracePlayIndex = -1;
      state.tracePlaybackActive = false;
      clearInterval(state.tracePlaybackTimer);
      await loadSelectedCase();
      renderAll();
    }

    function setPage(id) {
      if (!pageDefs.some(([pageId]) => pageId === id)) return;
      state.activePage = id;
      state.activeTab = pageToTab(id);
      if (id !== 'trace') {
        state.tracePlaybackActive = false;
        clearInterval(state.tracePlaybackTimer);
      }
      history.replaceState(null, '', id === 'overview' ? location.pathname : `#${id}`);
      renderAll();
    }

    function setTab(id) {
      state.activeTab = id;
      renderWorkbench();
    }

    function focusCandidate(id, event) {
      event?.stopPropagation();
      state.selectedCandidateId = id;
      renderCandidateOverview();
    }

    async function stepSelected() {
      if (!state.selectedCaseId) return;
      try {
        toast('正在执行下一步受控追证 action...');
        await api(`/api/cases/${state.selectedCaseId}/step`, { method: 'POST', body: JSON.stringify({}) });
        await refreshAll();
        toast('追证 action 已完成，证据与轨迹已更新。');
      } catch (err) { toast(`追证失败：${err.message || err}`); }
    }

    async function runSelected() {
      if (!state.selectedCaseId) return;
      try {
        toast('正在运行选中案例的主动追证闭环...');
        await api(`/api/cases/${state.selectedCaseId}/run?max_steps=8`, { method: 'POST' });
        await refreshAll();
        toast('选中案例闭环已运行完成。');
      } catch (err) { toast(`运行失败：${err.message || err}`); }
    }

    async function runFullLoop() {
      try {
        toast('正在运行完整 Team-I demo，可能需要一些时间...');
        await api('/api/demo/run?reset=true&max_steps=8', { method: 'POST' });
        await refreshAll();
        toast('完整闭环已完成：案件、证据、轨迹、护照与候选模式已刷新。');
      } catch (err) { toast(`完整闭环失败：${err.message || err}`); }
    }

    function toggleReviewMenu() {
      if (!state.selectedCaseId) return;
      state.reviewMenuOpen = !state.reviewMenuOpen;
      renderWorkbench();
    }

    async function approveCandidate(candidateId, event) {
      event?.stopPropagation();
      const id = candidateId || state.selectedCandidateId || state.candidates[0]?.candidate_id;
      if (!id) return;
      state.selectedCandidateId = id;
      try {
        const payload = await api(`/api/patterns/candidates/${encodeURIComponent(id)}/review`, {
          method: 'POST',
          body: JSON.stringify({ decision: 'approve', note: 'Approved from frontend demo.', reviewer: 'demo_auditor' })
        });
        await refreshAll();
        renderCandidateOverview();
        toast(`候选模式已写回：risk_pattern=${payload.risk_pattern_id || id}`);
      } catch (err) { toast(`模式写回失败：${err.message || err}`); }
    }

    refreshAll();
  </script>
</body>
</html>
