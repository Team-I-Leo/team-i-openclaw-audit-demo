<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team-I OpenCLAW Audit Demo</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      --bg: #061019;
      --bg2: #071a24;
      --panel: rgba(9, 24, 38, 0.92);
      --panel2: rgba(13, 34, 52, 0.84);
      --line: rgba(33, 231, 202, 0.18);
      --line2: rgba(124, 172, 255, 0.18);
      --text: #eef8ff;
      --muted: #8ca6b8;
      --dim: #536879;
      --cyan: #22e7ca;
      --blue: #45a3ff;
      --amber: #ffb356;
      --red: #ff5a6f;
      --green: #2fe68f;
      --purple: #a981ff;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.36);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font: 13px/1.45 "Inter", "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(34, 231, 202, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(69, 163, 255, 0.032) 1px, transparent 1px),
        linear-gradient(180deg, #051019 0%, #081923 52%, #050c14 100%);
      background-size: 28px 28px, 28px 28px, auto;
      overflow-x: hidden;
    }
    button, select {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: rgba(8, 27, 42, 0.86);
      border-radius: 7px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color .18s ease, transform .18s ease, background .18s ease;
    }
    button:hover { border-color: rgba(34, 231, 202, .7); background: rgba(13, 48, 66, 0.94); transform: translateY(-1px); }
    button.primary { background: linear-gradient(90deg, rgba(34,231,202,.92), rgba(69,163,255,.86)); color: #031017; border-color: transparent; font-weight: 800; }
    button.warn { border-color: rgba(255, 179, 86, .42); color: #ffd39b; }
    button.danger { border-color: rgba(255, 90, 111, .42); color: #ff9aa8; }
    select {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(8, 27, 42, 0.92);
      color: var(--text);
      border-radius: 7px;
      padding: 8px 34px 8px 12px;
      min-width: 150px;
      outline: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--cyan) 50%), linear-gradient(135deg, var(--cyan) 50%, transparent 50%);
      background-position: calc(100% - 18px) 50%, calc(100% - 12px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    .app { min-height: 100vh; display: grid; grid-template-rows: 64px auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid rgba(34, 231, 202, .28);
      background: rgba(4, 12, 20, .88);
      backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(69, 163, 255, .12), 0 14px 30px rgba(0, 0, 0, .24);
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: white;
      background: #101820;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 0 18px rgba(34,231,202,.16), 0 0 22px rgba(34,231,202,.12);
    }
    h1 { margin: 0; font-size: 18px; letter-spacing: 0; line-height: 1.1; }
    h1 span { display: inline; }
    .subline { color: var(--muted); font-size: 12px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .page-nav {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 460px;
    }
    .nav-btn {
      padding: 8px 10px;
      min-width: 76px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      border-color: rgba(124,172,255,.13);
      white-space: nowrap;
    }
    .nav-btn.active {
      color: var(--text);
      border-color: rgba(34,231,202,.62);
      background: linear-gradient(180deg, rgba(34,231,202,.16), rgba(69,163,255,.08));
      box-shadow: inset 0 0 0 1px rgba(34,231,202,.10), 0 0 20px rgba(34,231,202,.10);
    }
    .statusbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .sys {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid rgba(34,231,202,.22);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(10, 31, 45, .72);
      white-space: nowrap;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 16px var(--green); }
    .main {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      gap: 10px;
      padding: 10px 12px;
      align-items: start;
    }
    .main.detail-focus {
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto;
      align-items: stretch;
    }
    .main.detail-focus .kpis,
    .main.detail-focus .controls,
    .main.detail-focus .order-stream,
    .main.detail-focus .queue-panel,
    .main.detail-focus .case-board,
    .main.detail-focus .weak-panel,
    .main.detail-focus .candidate-panel {
      display: none;
    }
    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 31, 49, .94), rgba(6, 18, 31, .94));
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid rgba(34,231,202,.14);
      background: linear-gradient(90deg, rgba(34,231,202,.10), rgba(69,163,255,.05));
    }
    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 14px;
      letter-spacing: 0;
    }
    .panel-title::before {
      content: "";
      width: 4px;
      height: 18px;
      border-radius: 4px;
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(34,231,202,.65);
    }
    .count { color: var(--muted); font-weight: 700; }
    .kpis {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
    }
    .kpi {
      border: 1px solid rgba(124, 172, 255, .16);
      background: linear-gradient(180deg, rgba(19, 41, 63, .9), rgba(8, 21, 35, .92));
      border-radius: 8px;
      padding: 12px 14px;
      min-height: 78px;
      position: relative;
      overflow: hidden;
    }
    .kpi::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--cyan), transparent);
      opacity: .7;
    }
    .kpi .label { color: var(--muted); font-size: 12px; }
    .kpi strong { display: block; font-size: 28px; line-height: 1.05; margin-top: 7px; font-weight: 900; }
    .kpi .note { color: var(--dim); font-size: 11px; margin-top: 5px; }
    .controls {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(34,231,202,.16);
      background: rgba(4, 19, 29, .72);
      border-radius: 8px;
    }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .order-stream { grid-column: 1; grid-row: auto; }
    .queue-panel { grid-column: 1; grid-row: auto; }
    .case-board { grid-column: 1; grid-row: auto; }
    .candidate-panel { grid-column: 1; grid-row: auto; }

    .stream { max-height: 360px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 9px 10px; text-align: left; border-bottom: 1px solid rgba(124, 172, 255, .08); white-space: nowrap; }
    th { color: #37d9bd; font-size: 12px; background: rgba(34,231,202,.05); position: sticky; top: 0; z-index: 1; }
    td { color: #c9d8e5; }
    .case-id { color: #28d7ff; font-weight: 900; text-decoration: underline; text-underline-offset: 3px; cursor: pointer; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .pill.red { color: #ffb0ba; background: rgba(255, 90, 111, .12); border-color: rgba(255,90,111,.28); }
    .pill.amber { color: #ffd09a; background: rgba(255, 179, 86, .12); border-color: rgba(255,179,86,.30); }
    .pill.green { color: #a7ffd0; background: rgba(47, 230, 143, .10); border-color: rgba(47,230,143,.26); }
    .pill.blue { color: #b5d7ff; background: rgba(69,163,255,.12); border-color: rgba(69,163,255,.26); }
    .confidence { display: grid; gap: 3px; min-width: 68px; }
    .bar { height: 6px; border-radius: 999px; background: rgba(255,255,255,.09); overflow: hidden; }
    .bar > span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--cyan), var(--blue)); }
    .case-grid { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 12px; max-height: 472px; overflow: auto; }
    .case-card {
      border: 1px solid rgba(124, 172, 255, .15);
      background: linear-gradient(180deg, rgba(11, 30, 49, .95), rgba(8, 19, 33, .96));
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      min-height: 0;
      position: relative;
      overflow: hidden;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .case-card.active {
      border-color: rgba(34,231,202,.72);
      box-shadow: inset 0 0 0 1px rgba(34,231,202,.20), 0 0 26px rgba(34,231,202,.12);
    }
    .case-card:hover { transform: translateY(-2px); border-color: rgba(34,231,202,.46); }
    .case-card h3 { font-size: 18px; margin: 0 0 3px; line-height: 1; letter-spacing: 0; }
    .case-name { font-size: 15px; font-weight: 900; margin: 0; }
    .case-top { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start; }
    .case-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; color: var(--muted); font-weight: 700; margin-top: 9px; }
    .case-signal { margin: 9px 0; color: #ffc075; font-weight: 900; min-height: 0; }
    .progress-label { display: flex; justify-content: space-between; color: var(--muted); margin: 6px 0 5px; }
    .progress-label b { color: #ffc075; font-size: 20px; line-height: 1; }
    .card-actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
    .card-actions button { padding: 6px 8px; font-size: 12px; }
    .case-card-detail {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(124,172,255,.12);
    }
    .case-card.expanded .case-card-detail { display: block; }
    .steps { display: grid; grid-template-columns: 1fr 118px; gap: 10px; align-items: center; }
    .step-list { display: grid; gap: 8px; border-left: 2px solid rgba(34,231,202,.18); padding-left: 15px; }
    .step-item { position: relative; display: grid; gap: 1px; color: var(--muted); font-size: 12px; }
    .step-item::before {
      content: "";
      position: absolute;
      left: -23px;
      top: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 14px rgba(34,231,202,.75);
    }
    .step-item strong { color: var(--text); font-size: 13px; }
    .radar { width: 118px; height: 118px; opacity: .95; }
    .workbench {
      grid-column: 1;
      grid-row: auto;
      display: block;
      min-height: 0;
      max-height: 520px;
      overflow: auto;
    }
    .main.detail-focus .workbench {
      grid-column: 1;
      grid-row: 1;
      min-height: calc(100vh - 88px);
    }
    .detail-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(34,231,202,.14);
      background: rgba(4, 17, 28, .52);
    }
    .detail-actions .play-controls { justify-content: flex-end; }
    .detail-return { border-color: rgba(124,172,255,.24); color: #b5d7ff; }
    .review-menu {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,179,86,.18);
      background: rgba(255,179,86,.06);
    }
    .review-menu[hidden] { display: none; }
    .main.page-trace,
    .main.page-passport,
    .main.page-learning {
      grid-template-columns: minmax(300px, .72fr) minmax(690px, 1.62fr);
    }
    .main.page-trace .order-stream,
    .main.page-trace .queue-panel,
    .main.page-trace .weak-panel,
    .main.page-trace .candidate-panel,
    .main.page-passport .order-stream,
    .main.page-passport .queue-panel,
    .main.page-passport .weak-panel,
    .main.page-passport .candidate-panel,
    .main.page-learning .order-stream,
    .main.page-learning .queue-panel,
    .main.page-learning .weak-panel,
    .main.page-learning .candidate-panel { display: none; }
    .main.page-trace .case-board,
    .main.page-passport .case-board,
    .main.page-learning .case-board { grid-column: 1; grid-row: 3; }
    .main.page-trace .workbench,
    .main.page-passport .workbench,
    .main.page-learning .workbench { grid-column: 2; grid-row: 3 / 5; min-height: 760px; }
    .demo-lane {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(34,231,202,.14);
      background: rgba(4, 17, 28, .52);
      align-items: stretch;
    }
    .lane-step {
      border: 1px solid rgba(124, 172, 255, .14);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 9px;
      min-height: 74px;
    }
    .lane-step b { display: block; color: var(--cyan); margin-bottom: 4px; }
    .lane-step span { color: var(--muted); font-size: 12px; }
    .tabs {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(34,231,202,.14);
      background: rgba(6, 19, 31, .82);
    }
    .tab {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 7px;
      padding: 9px 13px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      cursor: pointer;
      font-weight: 800;
    }
    .tab.active {
      color: var(--text);
      border-color: rgba(34,231,202,.50);
      background: linear-gradient(180deg, rgba(34,231,202,.16), rgba(69,163,255,.08));
      box-shadow: inset 0 0 0 1px rgba(34,231,202,.08);
    }
    .tab-body {
      padding: 12px;
      min-height: 0;
      background: rgba(2, 13, 22, .38);
    }
    .split { display: grid; grid-template-columns: 1.12fr .88fr; gap: 12px; }
    .subpanel {
      border: 1px solid rgba(124, 172, 255, .13);
      background: rgba(4, 15, 25, .56);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }
    .subhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
    .subhead h4 { margin: 0; font-size: 14px; }
    .timeline { display: grid; gap: 9px; max-height: 408px; overflow: auto; padding-right: 4px; }
    .trace-stage {
      display: grid;
      grid-template-columns: repeat(6, minmax(92px, 1fr));
      gap: 8px;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(34,231,202,.18);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(34,231,202,.07), rgba(69,163,255,.04));
      position: relative;
      overflow: hidden;
    }
    .trace-stage::before {
      content: "";
      position: absolute;
      left: -30%;
      top: 0;
      width: 32%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(34,231,202,.18), transparent);
      animation: sweep 2.6s linear infinite;
      pointer-events: none;
    }
    .flow-step {
      position: relative;
      z-index: 1;
      min-height: 84px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(4, 15, 25, .72);
      color: var(--muted);
    }
    .flow-step b { display: block; color: var(--text); margin-bottom: 5px; }
    .flow-step small { display: block; min-height: 32px; }
    .flow-step.done { border-color: rgba(47,230,143,.26); }
    .flow-step.active {
      border-color: rgba(34,231,202,.82);
      box-shadow: 0 0 22px rgba(34,231,202,.16), inset 0 0 18px rgba(34,231,202,.08);
      color: #dffcff;
    }
    .flow-step.pending { opacity: .45; }
    .flow-meta { display: flex; justify-content: space-between; gap: 8px; margin-top: 7px; font-size: 11px; }
    .live-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .live-cell {
      border: 1px solid rgba(124,172,255,.14);
      border-radius: 8px;
      padding: 10px;
      background: rgba(255,255,255,.035);
      min-width: 0;
    }
    .live-cell span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .live-cell b { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .play-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; justify-content: flex-end; }
    .thread {
      display: grid;
      grid-template-columns: 50px 1fr;
      gap: 10px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 10px;
    }
    .thread.active { border-color: rgba(34,231,202,.62); box-shadow: inset 0 0 0 1px rgba(34,231,202,.08); }
    .thread.pending { opacity: .38; }
    .thread .idx {
      display: grid;
      place-items: center;
      color: #071018;
      font-weight: 900;
      border-radius: 7px;
      background: linear-gradient(180deg, var(--cyan), var(--blue));
      min-height: 46px;
    }
    .thread h5 { margin: 0 0 5px; font-size: 14px; }
    .thread p { margin: 4px 0 0; color: var(--muted); }
    .evidence-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; max-height: 520px; overflow: auto; }
    .evidence {
      border: 1px solid rgba(255,255,255,.08);
      border-left: 4px solid var(--green);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 10px;
    }
    .evidence.counter, .evidence.uncertainty { border-left-color: var(--amber); }
    .evidence h5 { margin: 0 0 6px; font-size: 13px; }
    .evidence p { margin: 0 0 8px; color: var(--muted); }
    .passport-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: 12px; }
    .passport-box {
      border: 1px solid rgba(34,231,202,.20);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(34,231,202,.06), rgba(69,163,255,.035));
      padding: 12px;
    }
    .passport-box h4 { margin: 0 0 8px; }
    .passport-box p, .passport-box li { color: var(--muted); }
    .graph-wrap { height: 470px; position: relative; overflow: hidden; border-radius: 8px; border: 1px dashed rgba(34,231,202,.22); background: rgba(1, 10, 18, .56); }
    .graph-svg { width: 100%; height: 100%; display: block; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
    .legend span { display: flex; align-items: center; gap: 6px; color: var(--muted); }
    .legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .learning-grid { display: grid; grid-template-columns: minmax(280px, .8fr) 1.2fr; gap: 12px; }
    .candidate-list { display: grid; gap: 8px; max-height: 460px; overflow: auto; }
    .candidate {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
    }
    .candidate.active { border-color: rgba(34,231,202,.48); background: rgba(34,231,202,.08); }
    .overview-candidate-panel .candidate-list { max-height: 260px; padding: 10px; }
    .overview-candidate-panel .candidate {
      display: grid;
      gap: 6px;
      min-height: 72px;
    }
    .candidate-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .candidate-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }

    .signal-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .writeback {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 10px 0;
    }
    .write-step { border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 10px; background: rgba(255,255,255,.035); min-height: 86px; }
    .write-step b { color: var(--cyan); display: block; margin-bottom: 6px; }
    .queue { max-height: 240px; overflow: auto; }
    .queue table th, .queue table td { padding: 8px; }

    .route-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px;
      padding: 9px;
      background: rgba(255,255,255,.035);
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      border: 1px solid rgba(34,231,202,.38);
      background: rgba(5, 19, 31, .94);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      box-shadow: var(--shadow);
      max-width: 420px;
      display: none;
    }
    .toast.show { display: block; }
    .empty { color: var(--dim); padding: 24px; text-align: center; }
    .mono { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    .muted { color: var(--muted); }
    .hot { color: var(--amber); font-weight: 900; }
    .ok { color: var(--green); font-weight: 900; }
    .bad { color: var(--red); font-weight: 900; }
    .blue { color: var(--blue); font-weight: 900; }
    .highlighted-order {
      background: rgba(34, 231, 202, 0.12) !important;
      box-shadow: inset 0 0 0 1px rgba(34,231,202,.35);
    }
    .highlighted-order td {
      color: #dffcff;
      font-weight: 800;
    }
    .trace-steps {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .trace-step {
      border: 1px solid rgba(124, 172, 255, .14);
      background: rgba(255,255,255,.035);
      border-radius: 8px;
      padding: 12px 8px;
      cursor: pointer;
      text-align: center;
      transition: all .18s ease;
      position: relative;
    }
    .trace-step:hover { border-color: rgba(34,231,202,.5); transform: translateY(-1px); }
    .trace-step.selected {
      border-color: rgba(34,231,202,.72);
      box-shadow: inset 0 0 0 1px rgba(34,231,202,.20), 0 0 20px rgba(34,231,202,.12);
    }
    .trace-step.completed { border-color: rgba(47,230,143,.28); }
    .trace-step.skipped { border-color: rgba(255,179,86,.28); opacity:.85; }
    .trace-step.pending { border-color: rgba(83,104,121,.28); }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%;
      display: grid; place-items: center; margin: 0 auto 8px;
      color: #071018; font-weight: 900; font-size: 13px;
      background: linear-gradient(180deg, var(--dim), #3a4f5e);
    }
    .trace-step.completed .step-num { background: linear-gradient(180deg, var(--green), #1cb876); }
    .trace-step.skipped .step-num { background: linear-gradient(180deg, var(--amber), #c98a3c); }
    .trace-step.pending .step-num { background: linear-gradient(180deg, var(--dim), #3a4f5e); }
    .step-name { font-weight: 800; font-size: 13px; margin-bottom: 4px; }
    .step-status { font-size: 11px; color: var(--muted); }
    .step-detail { min-height: 0; }
    .cyan-text { color: var(--cyan); font-weight: 900; }
    .review-panel-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .review-form { margin-top: 12px; padding: 12px; border: 1px solid rgba(124,172,255,.14); border-radius: 8px; background: rgba(4,15,25,.56); }
    .review-form textarea { width: 100%; min-height: 60px; background: rgba(8,27,42,.86); border: 1px solid var(--line); color: var(--text); border-radius: 7px; padding: 8px; font: inherit; resize: vertical; outline: none; }
    .review-form textarea:focus { border-color: rgba(34,231,202,.5); }
    .recommend-list { display: grid; gap: 6px; margin-bottom: 10px; }
    .recommend-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03); cursor: pointer; }
    .recommend-item:hover { border-color: rgba(34,231,202,.35); }
    .recommend-item input { accent-color: var(--cyan); }
    @keyframes sweep {
      from { transform: translateX(0); }
      to { transform: translateX(420%); }
    }
    @media (max-width: 1180px) {
      .topbar { height: auto; flex-wrap: wrap; }
      .page-nav { order: 3; width: 100%; min-width: 0; justify-content: flex-start; overflow-x: auto; }
      .main { grid-template-columns: 1fr; }
      .order-stream, .queue-panel, .case-board, .weak-panel, .candidate-panel, .workbench { grid-column: auto; grid-row: auto; }
      .kpis, .demo-lane, .writeback { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workbench { grid-column: auto; }
      .split, .passport-grid, .learning-grid { grid-template-columns: 1fr; }
      .main.page-trace .case-board,
      .main.page-trace .workbench,
      .main.page-passport .case-board,
      .main.page-passport .workbench,
      .main.page-learning .case-board,
      .main.page-learning .workbench {
        grid-column: auto;
        grid-row: auto;
        max-height: none;
      }
      .main.page-trace .order-stream,
      .main.page-passport .order-stream,
      .main.page-learning .order-stream { display: grid; }
    }
    @media (max-width: 680px) {
      html, body, .app { width: 100%; max-width: 100%; overflow-x: hidden; }
      .topbar { align-items: flex-start; flex-direction: column; height: auto; gap: 10px; }
      .brand { width: 100%; align-items: flex-start; display: grid; grid-template-columns: 34px minmax(0, 1fr); }
      .page-nav { width: 100%; min-width: 0; justify-content: flex-start; overflow-x: auto; padding-bottom: 2px; }
      .nav-btn { min-width: max-content; width: auto; }
      .brand > div:last-child { min-width: 0; }
      h1 { font-size: 16px; line-height: 1.22; white-space: normal; overflow-wrap: anywhere; word-break: break-word; }
      h1 span { display: block; }
      .subline { white-space: normal; line-height: 1.35; overflow-wrap: anywhere; word-break: break-all; }
      .statusbar { width: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); justify-content: flex-start; }
      .sys { max-width: 100%; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
      .sys b, .sys span { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
      .app { grid-template-rows: auto auto; }
      .main { width: 100%; max-width: 100%; padding: 8px; grid-template-columns: minmax(0, 1fr); }
      .kpis, .case-grid, .demo-lane, .evidence-grid, .writeback, .trace-stage, .live-strip { grid-template-columns: 1fr; }
      .kpis, .panel, .controls, .kpi, .case-card, .subpanel { width: 100%; min-width: 0; }
      th, td { white-space: normal; }
      .controls { align-items: stretch; flex-direction: column; }
      .filters, .actions { width: 100%; }
      .statusbar button { grid-column: 1 / -1; }
      select, button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">D.</div>
        <div>
          <h1>跨境电商连续审计 · <span>Team-I 主动追证指挥中心</span></h1>
          <div class="subline">OpenCLAW 工具编排 · 证据护照 · 人工确认写回模式库</div>
        </div>
      </div>
      <nav class="page-nav" id="pageNav" aria-label="演示页面导航"></nav>
      <div class="statusbar">
        <div class="sys"><span class="dot"></span><span id="runtimeStatus">系统运行中</span></div>
        <div class="sys">模型服务 <b id="backendStatus">loading</b></div>
        <div class="sys">最后更新 <b id="lastUpdated">--</b></div>
        <button onclick="refreshAll()">刷新</button>
      </div>
    </header>

    <main class="main page-overview" id="main">
      <section class="kpis" id="kpis"></section>

      <section class="controls">
        <div class="filters">
          <select id="patternFilter" onchange="renderAll()">
            <option value="all">风险模式：全部</option>
          </select>
          <select id="progressFilter" onchange="renderAll()">
            <option value="all">追证进度：全部</option>
            <option value="investigating">主动追证与反证检索中</option>
            <option value="passport">证据护照已生成</option>
            <option value="review">等待人工复核</option>
          </select>
          <select id="levelFilter" onchange="renderAll()">
            <option value="all">案例等级：全部</option>
            <option value="critical">严重</option>
            <option value="high">高</option>
            <option value="medium">中</option>
          </select>
        </div>
        <div class="count">选择案件后，在下方“案件详情”中执行追证、闭环运行和人工确认。</div>
      </section>

      <section class="panel order-stream">
        <div class="panel-head">
          <div class="panel-title">实时订单与风险信号流</div>
          <span class="count" id="streamCount">-- 项</span>
        </div>
        <div class="stream">
          <table>
            <thead>
              <tr><th>时间</th><th>订单编号</th><th>用户</th><th>金额</th><th>风险信号</th><th>风险模式</th><th>处理结果</th></tr>
            </thead>
            <tbody id="orderStream"></tbody>
          </table>
        </div>
      </section>

      <section class="panel queue-panel">
        <div class="panel-head">
          <div class="panel-title">待处理风险案件</div>
          <span class="count" id="queueCount">-- 项</span>
        </div>
        <div class="queue">
          <table>
            <thead><tr><th>案件编号</th><th>风险模式</th><th>关联账号</th><th>关联订单</th><th>置信度</th><th>状态</th></tr></thead>
            <tbody id="queueRows"></tbody>
          </table>
        </div>
      </section>

      <section class="panel candidate-panel">
        <div class="panel-head">
          <div class="panel-title">新风险模式候选</div>
          <span class="count" id="candidateOverviewCount">-- 个</span>
        </div>
        <div class="candidate-list" id="candidateOverviewCards"></div>
      </section>



      <section class="panel workbench">
        <div class="panel-head">
          <div class="panel-title" id="workbenchTitle">风险案件详情</div>
          <span class="count" id="selectedStatus">请选择案例</span>
        </div>
        <div class="detail-actions">
          <span class="count">案件详情集中展示主动追证流、证据护照、多源融合图谱和模式学习闭环。</span>
          <div class="play-controls">
            <button class="detail-return" onclick="exitDetail()">返回总览</button>
            <button onclick="stepSelected()">下一步追证</button>
            <button class="warn" onclick="runSelected()">运行选中案例</button>
            <button class="primary" onclick="runFullLoop()">运行完整闭环</button>
            <button onclick="toggleReviewMenu()">人工确认</button>
          </div>
        </div>
        <div class="review-menu" id="reviewMenu" hidden></div>
        <div class="tabs" id="tabs"></div>
        <div class="tab-body" id="tabBody"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const pageDefs = [
      ['overview', '总览'],
      ['trace', '主动追证'],
      ['agents', 'Agent 协作'],
      ['fusion', '多源融合'],
      ['passport', '审计报告'],
      ['learning', '模式学习']
    ];

    function pageToTab(page) {
      return {
        trace: 'trace',
        agents: 'trace',
        fusion: 'graph',
        passport: 'passport',
        learning: 'learning'
      }[page] || 'trace';
    }

    function initialPage() {
      const hash = location.hash.replace('#', '');
      return pageDefs.some(([id]) => id === hash) ? hash : 'overview';
    }

    const state = {
      dashboard: null,
      cases: [],
      selectedCaseId: null,
      caseDetails: {},
      selectedCase: null,
      graph: null,
      passport: null,
      route: null,
      candidates: [],
      patterns: [],
      policyWeights: [],
      activePage: initialPage(),
      activeTab: pageToTab(initialPage()),
      selectedCandidateId: null,
      selectedCandidateDetailId: null,
      expandedCaseId: null,
      detailFocus: false,
      reviewMenuOpen: false,
      tracePlayIndex: -1,
      tracePlaybackActive: false,
      tracePlaybackTimer: null,
      highlightedOrderId: null,
      selectedTraceStep: 0,
      reviewMode: null,
      caseResultMap: {}
    };

    const actionLabels = {
      expand_infra_graph: '关系扩展',
      query_refund_cluster: '退款簇查询',
      query_subsidy_ledger: '补贴台账',
      query_payment_cluster: '支付聚类',
      query_logistics_trace: '物流真实性',
      compare_promo_cohort: '促销窗口对比',
      analyze_behavior_sequence: '行为序列',
      search_historical_cases: '历史案例',
      seek_counter_evidence: '反证检索',
      emit_passport: '护照生成',
      request_human_review: '人工复核'
    };



    async function api(path, opts = {}) {
      const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    function safeJson(value, fallback) {
      if (value == null) return fallback;
      if (typeof value !== 'string') return value;
      try { return JSON.parse(value); } catch { return fallback; }
    }

    function toast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.remove('show'), 3600);
    }

    function fmt(n, digits = 0) {
      if (n == null || Number.isNaN(Number(n))) return '--';
      return Number(n).toLocaleString('en-US', { maximumFractionDigits: digits, minimumFractionDigits: digits });
    }

    function riskLevelClass(level) {
      const v = String(level || '').toLowerCase();
      if (v.includes('critical') || v.includes('干预')) return 'red';
      if (v.includes('high') || v.includes('预警')) return 'amber';
      if (v.includes('medium')) return 'blue';
      return 'green';
    }

    function shortPatternName(patternId) {
      const map = {
        'EC-SKIM-001': '团伙刷单骗补',
        'EC-FAKE-002': '空包虚假交易',
        'EC-ARBI-003': '补贴套利观察'
      };
      return map[patternId] || patternId || '未知模式';
    }

    function caseHeadline(c) {
      const map = {
        'EC-SKIM-001': '团伙刷单骗补',
        'EC-FAKE-002': '空包虚假交易',
        'EC-ARBI-003': '补贴套利观察'
      };
      return map[c.pattern_id] || c.pattern_name || c.case_id;
    }

    function topSignals(c) {
      const scores = safeJson(c.scores, {});
      const entities = safeJson(c.primary_entities, {});
      if (c.pattern_id === 'EC-SKIM-001') {
        return `设备${(entities.devices || []).length}台/${(entities.users || []).length}账号 | IP同段/${(entities.ips || []).length} | 退款率${fmt((scores.refund_rate || 0) * 100, 0)}% | 补贴率${fmt((scores.subsidy_rate || 0) * 100, 0)}%`;
      }
      if (c.pattern_id === 'EC-FAKE-002') {
        return `物流异常率${fmt((scores.low_logistics_rate || 0) * 100, 0)}% | 自动确认${fmt((scores.avg_automation_score || 0) * 100, 0)}% | 评论复用`;
      }
      return `资格Key集中 | 补贴率${fmt((scores.subsidy_rate || 0) * 100, 0)}% | 退款时效<24h | 支付复用`;
    }

    function progressFor(c) {
      const status = String(c.status || '');
      if (status.includes('human_review') || status.includes('reviewed')) return 100;
      return Math.min(100, Math.round((Number(c.risk_score || 0) || 0.75) * 100));
    }

    function statusText(c) {
      const status = String(c.status || '');
      if (status.includes('human_review')) return '等待人工复核';
      if (status.includes('reviewed')) return '已确认';
      if (status.includes('investigation')) return '主动追证中';
      return status || '追证中';
    }

    function getComplexity(c) {
      const threadLen = (c.thread || []).length;
      const evLen = (c.evidence || []).length;
      const orderLen = (safeJson(c.primary_entities, {}).orders || []).length;
      if (threadLen >= 6 || evLen >= 15 || orderLen >= 70) return { level: 'high', label: '高复杂' };
      if (threadLen >= 3 || evLen >= 8 || orderLen >= 30) return { level: 'medium', label: '中复杂' };
      return { level: 'low', label: '低复杂' };
    }

    function getTraceSteps(c) {
      const complexity = getComplexity(c);
      const hasAssertion = !!(c.assertion || (c.thread || []).some(t => t.agent_id === 'assertion_agent'));
      const hasRoute = !!(state.route?.ranked_actions?.length || (c.thread || []).some(t => t.agent_id === 'case_router_agent' || t.agent_id === 'router_agent'));
      const hasEvidence = (c.evidence || []).some(e => e.kind === 'support');
      const hasCounter = (c.evidence || []).some(e => e.kind !== 'support');
      const hasPassport = !!(state.passport?.case_header);
      return [
        { id: 'assertion', name: '风险断言', status: hasAssertion ? 'completed' : 'pending', detail: c.assertion || '尚未生成风险断言' },
        { id: 'routing', name: '调查复杂度路由', status: hasRoute ? 'completed' : 'pending', detail: `复杂度评估：${complexity.label}。${complexity.level === 'low' ? '低复杂案件跳过证据与反证检索，直接生成护照。' : '系统根据证据缺口和治理成本排序候选动作。'}` },
        { id: 'evidence', name: '寻找证据', status: complexity.level === 'low' ? 'skipped' : (hasEvidence ? 'completed' : 'pending'), detail: null },
        { id: 'counter', name: '寻找反证', status: complexity.level === 'low' ? 'skipped' : (hasCounter ? 'completed' : 'pending'), detail: null },
        { id: 'passport', name: '生成证据护照', status: hasPassport ? 'completed' : 'pending', detail: null }
      ];
    }

    function renderStepDetail(step, c) {
      if (step.id === 'assertion') {
        const scores = safeJson(c.scores, {});
        const entities = safeJson(c.primary_entities, {});
        const signals = safeJson(c.signal_strength, {});
        const users = entities.users || [];
        const userList = users.slice(0, 5).join(', ') + (users.length > 5 ? ` 等${users.length}个账号` : '');
        const triggerSignal = Object.entries(signals).find(([, level]) => String(level).toLowerCase() === 'strong')?.[0] || Object.keys(signals)[0] || '规则初筛命中';
        const supportEvs = (c.evidence || []).filter(e => e.kind === 'support').slice(0, 3).map(e => cnEvidenceDimension(e.dimension)).join('、') || '暂无';
        const missingEvs = Object.keys(safeJson(c.evidence_requirements, {})).slice(0, 3).join('、') || '物流真实性、行为序列';
        const counterDirs = ['家庭共享设备', '校园网络', '自然促销流量'].slice(0, 2).join('、');
        return `
          <div class="subpanel">
            <div class="subhead"><h4>风险断言详情</h4><span class="pill ${step.status === 'completed' ? 'green' : 'amber'}">${step.status === 'completed' ? '已完成' : '待执行'}</span></div>
            <div style="line-height:1.8;color:var(--muted)">
              <p>在 <span class="cyan-text">BF-2025 跨境大促窗口</span> 内，<br>
              针对 <span class="cyan-text">账号 ${userList || '关联账号组'}</span>，</p>
              <div style="margin-top:10px;display:grid;gap:6px">
                <div>【怀疑的风险类型】<span style="color:var(--text);font-weight:700">${c.pattern_id} ${shortPatternName(c.pattern_id)}</span></div>
                <div>【涉及的业务范围】<span style="color:var(--text)">跨境电商订单 / 补贴台账 / 退款售后</span></div>
                <div>【初始触发信号】<span style="color:var(--text)">${triggerSignal}</span></div>
                <div>【当前支持证据】<span style="color:var(--text)">${supportEvs}</span></div>
                <div>【待验证证据维度】<span style="color:var(--text)">${missingEvs}</span></div>
                <div>【必要反证方向】<span style="color:var(--text)">${counterDirs}</span></div>
                <div>【人工复核标记】<span style="color:var(--text)">${statusText(c).includes('人工') || statusText(c).includes('review') ? '是' : '否'} · ${statusText(c)}</span></div>
              </div>
            </div>
          </div>
        `;
      }
      if (step.id === 'routing') {
        const complexity = getComplexity(c);
        const topActions = (state.route?.ranked_actions || []).slice(0, 5);
        return `
          <div class="subpanel">
            <div class="subhead"><h4>调查复杂度路由</h4><span class="pill ${complexity.level === 'high' ? 'red' : complexity.level === 'medium' ? 'amber' : 'green'}">${complexity.label}</span></div>
            <p style="line-height:1.6">系统评估该案件为 <b>${complexity.label}</b>。${complexity.level === 'low' ? '低复杂案件无需展开深度证据与反证检索，直接生成证据护照。' : '按证据缺口与治理成本排序候选动作，持续追证直到满足护照门槛。'}</p>
            ${topActions.length ? `
            <div style="margin-top:12px">
              <h5 style="margin:0 0 8px">候选动作排序</h5>
              ${topActions.map(r => `
                <div class="route-row" style="margin-bottom:6px">
                  <div><b>${actionLabels[r.action] || r.action}</b><div class="muted">${r.reason || '填补证据缺口'}</div></div>
                  <span class="pill ${Number(r.action_utility || 0) > .2 ? 'green' : 'amber'}">${fmt(r.action_utility, 3)}</span>
                </div>
              `).join('')}
            </div>` : ''}
          </div>
        `;
      }
      if (step.id === 'evidence') {
        const support = (c.evidence || []).filter(e => e.kind === 'support');
        return `
          <div class="subpanel">
            <div class="subhead"><h4>支持证据 (${support.length})</h4><span class="pill ${step.status === 'skipped' ? 'amber' : step.status === 'completed' ? 'green' : 'blue'}">${step.status === 'skipped' ? '已跳过' : step.status === 'completed' ? '已完成' : '待执行'}</span></div>
            <div class="evidence-grid">${support.map(e => `
              <div class="evidence support">
                <h5>${cnEvidenceDimension(e.dimension)} <span class="pill green">支持证据</span></h5>
                <p>${cnEvidenceDesc(e.description)}</p>
                <span class="pill blue">${cnEvidenceSource(e.source)}</span>
                <span class="pill">置信度 ${fmt(e.confidence, 2)}</span>
              </div>
            `).join('') || '<div class="empty">暂无支持证据</div>'}</div>
          </div>
        `;
      }
      if (step.id === 'counter') {
        const counter = (c.evidence || []).filter(e => e.kind !== 'support');
        return `
          <div class="subpanel">
            <div class="subhead"><h4>反证与不确定性 (${counter.length})</h4><span class="pill ${step.status === 'skipped' ? 'amber' : step.status === 'completed' ? 'green' : 'blue'}">${step.status === 'skipped' ? '已跳过' : step.status === 'completed' ? '已完成' : '待执行'}</span></div>
            <div class="evidence-grid">${counter.map(e => `
              <div class="evidence ${e.kind}">
                <h5>${cnEvidenceDimension(e.dimension)} <span class="pill amber">${e.kind === 'counter' ? '反证' : '不确定性'}</span></h5>
                <p>${cnEvidenceDesc(e.description)}</p>
                <span class="pill blue">${cnEvidenceSource(e.source)}</span>
                <span class="pill">置信度 ${fmt(e.confidence, 2)}</span>
              </div>
            `).join('') || '<div class="empty">暂无反证</div>'}</div>
          </div>
        `;
      }
      if (step.id === 'passport') {
        const p = state.passport || {};
        const evidence = c?.evidence || [];
        const support = evidence.filter(e => e.kind === 'support');
        const counter = evidence.filter(e => e.kind !== 'support');
        const threads = c?.thread || [];
        const scores = safeJson(c?.scores, {});
        const entities = safeJson(c?.primary_entities, {});
        const orders = entities.orders || [];
        const users = entities.users || [];
        const signals = safeJson(c?.signal_strength, {});
        const patternName = shortPatternName(c?.pattern_id);
        const sourcesList = Array.from(new Set(evidence.map(e => cnEvidenceSource(e.source)))).join('、') || '--';
        const executedActions = threads.map(t => actionLabels[t.action_taken] || t.action_taken).join(' → ') || '暂无';
        const uncertainties = counter.map(e => cnEvidenceDimension(e.dimension)).join('、') || '暂无';
        const confidenceScore = fmt((c?.risk_score || 0) * 100, 0);
        return `
          <div style="display:grid;gap:12px">
            <div class="passport-grid">
              <div class="passport-box">
                <h4>1. 案例基础信息</h4>
                <p>案件编号：<span class="cyan-text">${c?.case_id}</span></p>
                <p>风险模式：<span class="cyan-text">${c?.pattern_id} ${patternName}</span></p>
                <p>关联订单：${orders.length} 笔 · 关联账号：${users.length} 个</p>
                <p>当前状态：<span class="pill ${riskLevelClass(c?.risk_level)}">${statusText(c)}</span></p>
              </div>
              <div class="passport-box">
                <h4>2. 风险断言</h4>
                <p>${c?.assertion || p?.model_narrative || '风险断言尚未生成。'}</p>
              </div>
            </div>
            <div class="passport-grid">
              <div class="passport-box">
                <h4>3. 命中的规则与模式</h4>
                <p>规则编号：<span class="cyan-text">${c?.pattern_id}</span></p>
                <p>规则名称：${patternName}</p>
                <div class="signal-tags" style="margin-top:8px">
                  ${Object.entries(signals).map(([name, level]) => `<span class="pill ${String(level).toLowerCase() === 'strong' ? 'green' : String(level).toLowerCase() === 'medium' ? 'blue' : 'amber'}">${name} · ${level}</span>`).join('') || '<span class="pill">暂无信号</span>'}
                </div>
              </div>
              <div class="passport-box">
                <h4>4. 支持证据 (${support.length})</h4>
                <ul>${support.slice(0, 6).map(e => `<li>${cnEvidenceDimension(e.dimension)}：${cnEvidenceDesc(e.description).slice(0, 60)}${cnEvidenceDesc(e.description).length > 60 ? '...' : ''}</li>`).join('') || '<li>暂无支持证据</li>'}</ul>
              </div>
            </div>
            <div class="passport-grid">
              <div class="passport-box">
                <h4>5. 反证 (${counter.length})</h4>
                <ul>${counter.slice(0, 6).map(e => `<li>${cnEvidenceDimension(e.dimension)}：${cnEvidenceDesc(e.description).slice(0, 60)}${cnEvidenceDesc(e.description).length > 60 ? '...' : ''}</li>`).join('') || '<li>暂无反证</li>'}</ul>
              </div>
              <div class="passport-box">
                <h4>6. 证据来源</h4>
                <p>${sourcesList}</p>
                <h4 style="margin-top:12px">7. 已执行追证动作</h4>
                <p style="font-size:12px;line-height:1.6">${executedActions}</p>
              </div>
            </div>
            <div class="passport-grid">
              <div class="passport-box">
                <h4>8. 剩余不确定性</h4>
                <p>${uncertainties}</p>
              </div>
              <div class="passport-box">
                <h4>9. 建议下一步动作</h4>
                <ul>${(p?.recommended_action || ['提交人工复核', '保留证据链', '禁止自动处置']).map(x => `<li>${x}</li>`).join('')}</ul>
              </div>
            </div>
            <div class="passport-grid">
              <div class="passport-box">
                <h4>10. 是否需要人工审批</h4>
                <p>${p?.human_gate?.required ?? true ? '<span class="pill red">是</span> 当前证据满足度不足，需人工门禁确认。' : '<span class="pill green">否</span> 证据充分，可自动流转。'}</p>
                <p style="margin-top:6px">充分性=${p?.human_gate?.sufficiency_score ?? '--'} · 反证分=${p?.human_gate?.counter_score ?? '--'}</p>
              </div>
              <div class="passport-box">
                <h4>11. 当前可信度评估</h4>
                <p>风险置信度：<span class="cyan-text">${confidenceScore}%</span></p>
                <p>统计维度=${fmt(scores.statistical, 3)} · 关系维度=${fmt(scores.relational, 3)} · 行为维度=${fmt(scores.narrative_behavior, 3)}</p>
              </div>
            </div>
          </div>
        `;
      }
      return '';
    }

      renderTraceTab();

    async function enterOrderDetail(oid, caseId, event) {
      event?.stopPropagation();
      state.highlightedOrderId = oid;
      state.detailFocus = true;
      state.activeTab = 'orders';
      state.reviewMenuOpen = false;
      await selectCase(caseId);
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    function jsArg(value) {
      return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function getSignalLevel(c) {
      const signals = safeJson(c.signal_strength, {});
      const hasStrong = Object.values(signals).some(v => String(v).toLowerCase() === 'strong');
      const hasMedium = Object.values(signals).some(v => String(v).toLowerCase() === 'medium');
      const level = String(c.risk_level || '').toLowerCase();
      if (hasStrong || level.includes('critical') || level.includes('high')) return 'strong';
      if (hasMedium || level.includes('medium')) return 'medium';
      return 'weak';
    }

    async function refreshAll() {
      try {
        document.getElementById('runtimeStatus').textContent = '加载数据中';
        const [dashboard, cases, candidates, patterns, policyWeights] = await Promise.all([
          api('/api/dashboard'),
          api('/api/cases'),
          api('/api/patterns/candidates').catch(() => []),
          api('/api/patterns').catch(() => []),
          api('/api/policy/weights').catch(() => [])
        ]);
        state.dashboard = dashboard;
        state.cases = cases;
        state.candidates = candidates;
        state.patterns = patterns;
        state.policyWeights = policyWeights;
        const detailRows = await Promise.all(cases.map(c => api(`/api/cases/${c.case_id}`).catch(() => null)));
        state.caseDetails = {};
        detailRows.forEach(row => { if (row && row.case_id) state.caseDetails[row.case_id] = row; });
        if (!state.selectedCaseId && cases.length) state.selectedCaseId = cases[0].case_id;
        if (!state.selectedCandidateId && candidates.length) state.selectedCandidateId = candidates[0].candidate_id;
        renderFilters();
        await loadSelectedCase();
        document.getElementById('runtimeStatus').textContent = '系统运行中';
        document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        renderAll();
      } catch (err) {
        document.getElementById('runtimeStatus').textContent = '数据连接异常';
        toast(`加载失败：${err.message || err}`);
      }
    }

    async function loadSelectedCase() {
      if (!state.selectedCaseId) return;
      const id = state.selectedCaseId;
      const [selectedCase, graph, passport, route] = await Promise.all([
        api(`/api/cases/${id}`),
        api(`/api/cases/${id}/graph`).catch(() => null),
        api(`/api/cases/${id}/passport`).catch(() => null),
        api(`/api/cases/${id}/route`).catch(() => null)
      ]);
      state.selectedCase = selectedCase;
      state.graph = graph;
      state.passport = passport;
      state.route = route;
    }

    function renderFilters() {
      const select = document.getElementById('patternFilter');
      const existing = select.value || 'all';
      const patterns = Array.from(new Set(state.cases.map(c => c.pattern_id))).filter(Boolean);
      select.innerHTML = `<option value="all">风险模式：全部</option>` + patterns.map(p => `<option value="${p}">${p} ${shortPatternName(p)}</option>`).join('');
      select.value = patterns.includes(existing) ? existing : 'all';
    }

    function filteredCases() {
      const pattern = document.getElementById('patternFilter')?.value || 'all';
      const level = document.getElementById('levelFilter')?.value || 'all';
      const progress = document.getElementById('progressFilter')?.value || 'all';
      return state.cases.filter(c => {
        if (pattern !== 'all' && c.pattern_id !== pattern) return false;
        if (level !== 'all' && String(c.risk_level).toLowerCase() !== level) return false;
        if (progress === 'passport' && !String(c.status || '').includes('human_review')) return false;
        if (progress === 'review' && !String(c.status || '').includes('human_review')) return false;
        if (progress === 'investigating' && String(c.status || '').includes('human_review')) return false;
        return true;
      });
    }

    function renderPageNav() {
      const nav = document.getElementById('pageNav');
      nav.innerHTML = '';
      const main = document.getElementById('main');
      main.className = `main page-overview${state.detailFocus ? ' detail-focus' : ''}`;
    }

    function renderAll() {
      renderPageNav();
      renderKpis();
      renderOrderStream();
      renderCandidateOverview();
      renderQueue();
      renderWorkbench();
    }

    function renderKpis() {
      const dash = state.dashboard || {};
      const calls = (dash.model_invocations || []).reduce((sum, x) => sum + Number(x.count || 0), 0);
      const fallback = (dash.model_invocations || []).reduce((sum, x) => sum + (Number(x.used_fallback || 0) ? Number(x.count || 0) : 0), 0);
      const actions = (dash.actions || []).reduce((sum, x) => sum + Number(x.count || 0), 0);
      const backend = (dash.model_invocations || []).some(x => x.backend === 'openai') ? 'openai-compatible' : dash.model_backend || 'fallback';
      document.getElementById('backendStatus').textContent = backend;
      const cards = [
        ['风险案例', dash.case_count ?? state.cases.length, '三类典型跨境电商风险模式'],
        ['证据条目', dash.evidence_count ?? 0, '支持证据、反证与不确定性'],
        ['追证轨迹', dash.trajectory_count ?? 0, 'agent state / decision / reward'],
        ['OpenCLAW动作', actions, '受控 action registry 调用'],
        ['模型调用', calls, `fallback=${fallback}`],
        ['证据护照', dash.passport_count ?? 0, '可提交人工复核的输出']
      ];
      document.getElementById('kpis').innerHTML = cards.map(([label, value, note], i) => `
        <div class="kpi">
          <div class="label">${label}</div>
          <strong class="${i === 4 ? 'blue' : i === 5 ? 'ok' : ''}">${value}</strong>
          <div class="note">${note}</div>
        </div>
      `).join('');
    }

    function getOrderResult(caseId) {
      const mapped = state.caseResultMap[caseId];
      if (mapped) {
        return {
          text: mapped.status,
          pill: mapped.decision === 'risk_founded' ? 'red' : mapped.decision === 'risk_not_founded' ? 'green' : 'amber'
        };
      }
      const c = state.cases.find(x => x.case_id === caseId);
      if (!c) return { text: 'AI 自动处理', pill: 'blue' };
      const status = String(c.status || '');
      if (status.includes('human_review')) return { text: '等待人工处理', pill: 'amber' };
      if (status.includes('reviewed')) return { text: '人工已确认', pill: 'green' };
      return { text: 'AI 自动处理', pill: 'blue' };
    }

    function renderOrderStream() {
      const rows = [];
      const base = new Date();
      const signalStats = { strong: 0, medium: 0, weak: 0 };
      state.cases.forEach((c, ci) => {
        const entities = safeJson(c.primary_entities, {});
        const orders = (entities.orders || []).slice(0, 10);
        const signalLevel = getSignalLevel(c);
        const signalLabel = { strong: '强信号', medium: '中信号', weak: '弱信号' }[signalLevel];
        const signalClass = { strong: 'red', medium: 'amber', weak: 'green' }[signalLevel];
        const result = getOrderResult(c.case_id);
        const isWeak = signalLevel === 'weak';
        orders.forEach((oid, i) => {
          signalStats[signalLevel] = (signalStats[signalLevel] || 0) + 1;
          rows.push({
            time: new Date(base.getTime() - (ci * 10 + i) * 17000).toLocaleTimeString('zh-CN', { hour12: false }),
            oid,
            caseId: c.case_id,
            user: (entities.users || [])[i % Math.max(1, (entities.users || []).length)] || 'U-UNK',
            amount: c.pattern_id === 'EC-ARBI-003' ? 150 + i * 17 : c.pattern_id === 'EC-FAKE-002' ? 58 + i * 8 : 249 + i * 11,
            signalLabel,
            signalClass,
            patternId: isWeak ? '' : c.pattern_id,
            resultText: isWeak ? '' : result.text,
            resultPill: isWeak ? '' : result.pill
          });
        });
      });
      const fallbackCaseId = state.cases[0]?.case_id || 'DEMO';
      const extraDefs = [
        { level: 'strong', patternId: 'EC-SKIM-001', amountBase: 899 },
        { level: 'medium', patternId: 'EC-FAKE-002', amountBase: 299 },
        { level: 'weak', patternId: 'EC-ARBI-003', amountBase: 99 }
      ];
      const extraResultMap = { strong: { text: 'AI 自动处理', pill: 'blue' }, medium: { text: '等待人工处理', pill: 'amber' }, weak: { text: '', pill: '' } };
      extraDefs.forEach(({ level, patternId, amountBase }) => {
        const needed = Math.max(0, 3 - (signalStats[level] || 0));
        const er = extraResultMap[level];
        const isWeak = level === 'weak';
        for (let i = 0; i < needed; i++) {
          signalStats[level] = (signalStats[level] || 0) + 1;
          rows.push({
            time: new Date(base.getTime() - rows.length * 17000).toLocaleTimeString('zh-CN', { hour12: false }),
            oid: `${patternId.split('-')[2]}-${String(8000 + i + 1)}`,
            caseId: fallbackCaseId,
            user: `U-${String(Math.floor(Math.random() * 900) + 100)}`,
            amount: amountBase + Math.floor(Math.random() * 50),
            signalLabel: { strong: '强信号', medium: '中信号', weak: '弱信号' }[level],
            signalClass: { strong: 'red', medium: 'amber', weak: 'green' }[level],
            patternId: isWeak ? '' : patternId,
            resultText: isWeak ? '' : er.text,
            resultPill: isWeak ? '' : er.pill
          });
        }
      });
      document.getElementById('streamCount').textContent = `${rows.length} 项`;
      document.getElementById('orderStream').innerHTML = rows.map(r => `
        <tr>
          <td class="mono">${r.time}</td>
          <td><b class="case-id" style="cursor:pointer" onclick="enterOrderDetail('${jsArg(r.oid)}','${jsArg(r.caseId)}',event)">${r.oid}</b></td>
          <td class="mono">${r.user}</td>
          <td class="blue">¥${fmt(r.amount, 2)}</td>
          <td><span class="pill ${r.signalClass}">${r.signalLabel}</span></td>
          <td class="mono">${r.patternId}</td>
          <td>${r.resultText ? `<span class="pill ${r.resultPill}">${r.resultText}</span>` : ''}</td>
        </tr>
      `).join('');
    }

    function renderCandidateOverview() {
      const candidates = state.candidates || [];
      const body = document.getElementById('candidateOverviewCards');
      const countEl = document.getElementById('candidateOverviewCount');
      if (!body) return;
      countEl.textContent = `${candidates.length} 个`;
      const selected = candidates.find(c => c.candidate_id === state.selectedCandidateId) || candidates[0];
      body.innerHTML = candidates.map(c => {
        const active = selected && selected.candidate_id === c.candidate_id ? 'active' : '';
        const supporting = (c.supporting_cases || []).slice(0, 4).map(x => `<span class="pill blue">${x}</span>`).join('');
        const signals = (c.common_signals || []).slice(0, 6).map(x => `<span class="pill green">${x}</span>`).join('');
        const isDetailOpen = state.selectedCandidateDetailId === c.candidate_id;
        const detailHtml = isDetailOpen ? renderCandidateDetail(c) : '';
        return `
          <div class="candidate ${active}" onclick="focusCandidate('${jsArg(c.candidate_id)}', event)">
            <div style="display:flex;justify-content:space-between;gap:8px">
              <b class="case-id" onclick="showCandidateDetail('${jsArg(c.candidate_id)}', event)">${c.candidate_id}</b>
              <span class="pill ${c.status === 'approved' ? 'green' : c.status === 'rejected' ? 'red' : 'amber'}">${c.status || 'under_review'}</span>
            </div>
            <div class="muted">${c.name || 'learned pattern candidate'}</div>
            <div class="candidate-meta">${supporting || '<span class="pill">离线候选</span>'}</div>
            <div class="signal-tags">${signals || '<span class="pill amber">等待人工确认</span>'}</div>
            <div class="candidate-actions">
              <span class="muted">反证项 ${(c.required_counter_checks || []).length} 个</span>
              <button class="primary" onclick="approveCandidate('${jsArg(c.candidate_id)}', event)" ${c.status === 'approved' ? 'disabled' : ''}>审核通过并写回</button>
            </div>
            ${detailHtml}
          </div>
        `;
      }).join('') || `<div class="empty">暂无新风险模式候选</div>`;
    }

        evidence: (c.common_signals || []).length ? c.common_signals : d.evidence,
        counter: (c.required_counter_checks || []).length ? c.required_counter_checks : d.counter,
        actions: d.actions,
        gate: d.gate,
        disposal: d.disposal,
        version: d.version
      };

    function renderQueue() {

      document.getElementById('queueRows').innerHTML = cases.map(c => {
        const entities = safeJson(c.primary_entities, {});
        return `
        <tr style="cursor:pointer">
          <td><b class="case-id" onclick="enterCaseDetail('${jsArg(c.case_id)}',event)">${c.case_id}</b></td>
          <td>${shortPatternName(c.pattern_id)}</td>
          <td>${(entities.users || []).length}</td>
          <td>${(entities.orders || []).length}</td>

          <td><span class="pill ${riskLevelClass(c.risk_level)}">${statusText(c)}</span></td>

    function renderOrdersTab() {
      const c = state.selectedCase;
      const entities = safeJson(c.primary_entities, {});
      const orders = (entities.orders || []).slice(0, 50);
      const base = new Date();
      const status = String(c.status || '');
      const mapped = state.caseResultMap[c.case_id];
      let caseResult = 'AI 自动处理';
      let resultPill = 'blue';
      if (mapped) {
        caseResult = mapped.status;
        resultPill = mapped.decision === 'risk_founded' ? 'red' : mapped.decision === 'risk_not_founded' ? 'green' : 'amber';
      } else if (status.includes('human_review')) {
        caseResult = '等待人工处理';
        resultPill = 'amber';
      } else if (status.includes('reviewed')) {
        caseResult = '人工已确认';
        resultPill = 'green';
      }
      document.getElementById('tabBody').innerHTML = `
        <div class="subpanel" style="border:0;background:transparent;padding:0">
          <div class="subhead">
            <h4>关联风险订单 (${orders.length})</h4>
            <span class="pill ${resultPill}">${caseResult}</span>
          </div>
          ${!mapped && caseResult === '等待人工处理' ? `
          <div style="margin-bottom:12px;padding:10px;border:1px solid rgba(255,179,86,.25);border-radius:8px;background:rgba(255,179,86,.08)">
            <span class="hot">该案件需要人工复核。</span>
            <button class="primary" style="margin-left:10px" onclick="toggleReviewMenu()">人工处理</button>
          </div>` : ''}
          ${mapped && mapped.decision === 'risk_founded' ? `
          <div style="margin-bottom:12px;padding:10px;border:1px solid rgba(255,90,111,.25);border-radius:8px;background:rgba(255,90,111,.08)">
            <span class="bad">已处置：${mapped.action}</span>
          </div>` : ''}
          ${mapped && mapped.decision === 'risk_not_founded' ? `
          <div style="margin-bottom:12px;padding:10px;border:1px solid rgba(47,230,143,.25);border-radius:8px;background:rgba(47,230,143,.08)">
            <span class="ok">相关订单已放行</span>
          </div>` : ''}
          ${mapped && mapped.decision === 'evidence_insufficient' ? `
          <div style="margin-bottom:12px;padding:10px;border:1px solid rgba(255,179,86,.25);border-radius:8px;background:rgba(255,179,86,.08)">
            <span class="hot">补充调查方向：${mapped.action}</span>
          </div>` : ''}
          <div class="stream" style="max-height:520px;overflow:auto">
            <table>
              <thead>
                <tr><th>订单编号</th><th>关联用户</th><th>金额</th><th>时间</th><th>处理结果</th></tr>
              </thead>
              <tbody>
                ${orders.map((oid, i) => {
                  const isHighlighted = oid === state.highlightedOrderId;
                  const user = (entities.users || [])[i % Math.max(1, (entities.users || []).length)] || 'U-UNK';
                  const amount = c.pattern_id === 'EC-ARBI-003' ? 150 + i * 17 : c.pattern_id === 'EC-FAKE-002' ? 58 + i * 8 : 249 + i * 11;
                  const time = new Date(base.getTime() - i * 17000).toLocaleTimeString('zh-CN', { hour12: false });
                  return `
                    <tr class="${isHighlighted ? 'highlighted-order' : ''}">
                      <td><b class="case-id">${oid}</b></td>
                      <td class="mono">${user}</td>
